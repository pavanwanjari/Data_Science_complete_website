<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify Email - Access Course</title>
<link rel="icon" type="image/png" href="dl10x.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Enter your payment email to verify purchase and unlock your DataLearn10X course access.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="analytics.js" defer></script>
<script src="config.js" defer></script>
<style>
body{font-family:Poppins,sans-serif;text-align:center;padding:50px;background:#f4f7fc}
input{padding:12px;width:280px;border-radius:8px;border:1px solid #ccc}
button{padding:12px 25px;background:#16a34a;color:#fff;border:none;border-radius:25px;cursor:pointer}
#msg{margin-top:14px;min-height:20px}
</style>
</head>
<body>
<a href="index.html" aria-label="DataLearn10X Home" style="display:inline-block;margin:12px 0 0 12px">
  <img src="dl10x.png" alt="DataLearn10X logo" style="height:34px;width:auto;display:block">
</a>

<h2>Access Your Course</h2>
<p>Enter the same email used at payment. You can verify from any device if your purchase was saved to Sheet with course mapping.</p>
<input type="email" id="email" placeholder="Enter your email"><br><br>
<button id="verifyBtn" onclick="checkEmail()">Check Now</button>
<p id="msg"></p>

<script>
var SITE_CONFIG=window.DL10X_CONFIG||{};
var SHEET_WEBAPP_URL=SITE_CONFIG.SHEET_WEBAPP_URL||"https://script.google.com/macros/s/AKfycbw_qylYBxeRqEkXhED_Mq6-e71iq6w2A_aYlybpqdEQdcCglRrijCEWVwjnl0sh_mPJ/exec";
PSAAnalytics.trackEvent('verify_page_viewed',{});
sessionStorage.removeItem('paid');

function setMsg(t,e){var m=document.getElementById('msg'); m.style.color=e?'#b42318':'#157a38'; m.innerText=t;}
function getPaidLocal(email){try{var p=JSON.parse(localStorage.getItem('paidUsers')||'{}'); return p[email]||null;}catch(e){return null;}}
function grant(email,course,source){
  sessionStorage.setItem('paid','yes');
  sessionStorage.setItem('paid_email',email);
  if(course) sessionStorage.setItem('paid_course',course);
  PSAAnalytics.trackEvent('verify_success',{email:email,source:source});
  window.location.href='Excel_success_v3.html?email='+encodeURIComponent(email)+'&course='+encodeURIComponent(course||'');
}

function normalizeResult(text){
  var t=(text||'').trim();
  var up=t.toUpperCase();
  if(!t) return {found:false,course:''};

  function pickCourse(raw){
    if(Array.isArray(raw)) return raw.join(' | ');
    if(!raw) return '';
    var s=String(raw).trim();
    if(!s) return '';
    return s;
  }

  if(['NOT FOUND','NOT_FOUND','FALSE','NO','UNPAID','ERROR'].includes(up)) return {found:false,course:''};
  if(['FOUND','TRUE','YES','PAID','SUCCESS','OK'].includes(up)) return {found:true,course:''};

  var foundCoursePrefix=t.match(/^(?:FOUND|SUCCESS|PAID)\s*[:\-|]\s*(.+)$/i);
  if(foundCoursePrefix && foundCoursePrefix[1]){
    return {found:true,course:foundCoursePrefix[1].trim()};
  }

  try{
    var parsed=JSON.parse(t);
    if(parsed){
      var status=(parsed.status||'').toString().toUpperCase();
      var isFound = parsed.found===true || parsed.paid===true || ['FOUND','PAID','SUCCESS','OK','TRUE','YES'].indexOf(status)>-1;

      var c = pickCourse(parsed.course) || pickCourse(parsed.courses) || pickCourse(parsed.purchased_course) || pickCourse(parsed.purchasedCourses);
      if(!c && parsed.data){
        c = pickCourse(parsed.data.course) || pickCourse(parsed.data.courses) || pickCourse(parsed.data.purchased_course) || pickCourse(parsed.data.purchasedCourses);
      }
      if(!c && parsed.result){
        c = pickCourse(parsed.result.course) || pickCourse(parsed.result.courses);
      }

      if(c){ return {found:true,course:c}; }
      if(isFound){ return {found:true,course:''}; }
    }
  }catch(e){}
  var looksLikeCourse = /\b(Advance Excel|Python|Power BI|Tableau|SQL \(MySQL\)|SQL|MySQL|Machine Learning|ML \+ DL|Cheat Sheets and Interview Questions|20000\+ HR Emails|HR Emails|Data Analytics Cheat Sheets|Data Analytics Combo|Combo)\b/i.test(t);

  if(looksLikeCourse){
    return {found:true,course:t};
  }

  return {found:false,course:''};
}

function checkEmail(){
  var email=document.getElementById('email').value.trim().toLowerCase();
  if(!email){setMsg('Please enter email.',true); return;}
  var local = getPaidLocal(email);
  if(local && local.paid){
    var localCourse = Array.isArray(local.allCourses) && local.allCourses.length ? local.allCourses.join(' | ') : (local.course || '');
    if(localCourse){
      setMsg('Purchase found. Redirecting...',false);
      grant(email, localCourse,'local');
      return;
    }
  }

  var btn=document.getElementById('verifyBtn');
  btn.disabled=true;
  setMsg('Checking your purchase...',false);
  var url1=SHEET_WEBAPP_URL+'?action=check&email='+encodeURIComponent(email);
  var url2=SHEET_WEBAPP_URL+'?email='+encodeURIComponent(email);

  fetch(url1).then(r=>r.text()).then(function(t){
    var r1=normalizeResult(t);
    if(r1.found && r1.course){ grant(email,r1.course,'sheet'); return; }

    return fetch(url2).then(r=>r.text()).then(function(x){
      var r2=normalizeResult(x);
      if(r2.found && r2.course){ grant(email,r2.course,'sheet_legacy'); return; }
      if(r1.found || r2.found){
        setMsg('Purchase is found, but course mapping is missing. Please contact support with payment email.',true);
        btn.disabled=false;
        PSAAnalytics.trackEvent('verify_course_missing',{email:email,result1:(t||'').trim(),result2:(x||'').trim()});
        return;
      }
      setMsg('Email not found. Please use same payment email or contact support.',true);
      btn.disabled=false;
      PSAAnalytics.trackEvent('verify_not_found',{email:email,result:(x||'').trim()});
    });
  }).catch(function(){
    btn.disabled=false;
    setMsg('Error checking email. Please try again.',true);
    PSAAnalytics.trackEvent('verify_error',{});
  });
}
</script>
</body>
</html>
