<!DOCTYPE html>
<html lang="en">
  <!-- SECTION: HEAD (meta, styles, scripts) -->
<head>
<meta charset="UTF-8">
<title>Course Access - DataLearn10X</title>
<link rel="icon" type="image/png" href="dl10x.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Access your purchased DataLearn10X courses, notes, and video lessons from one secure page.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="config.js" defer></script>
<script src="analytics.js" defer></script>
  <link rel="stylesheet" href="theme_professional.css">
<style>
body.app-excel-success{font-family:'Poppins',sans-serif;background:radial-gradient(circle at 12% 10%,#23396f 0,#0b1020 38%,#070b14 100%)!important;margin:0;padding:30px 14px;color:#dfe9ff!important}
.app-excel-success .shell{max-width:980px;margin:0 auto}
.app-excel-success .top-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:16px;text-decoration:none}
.app-excel-success .top-logo img{height:44px;width:auto;display:block}
.app-excel-success .box{background:linear-gradient(145deg,rgba(12,23,46,.94),rgba(18,30,60,.82))!important;border:1px solid rgba(122,165,238,.26);max-width:980px;margin:auto;padding:24px 18px;border-radius:20px;box-shadow:0 14px 36px rgba(0,0,0,.32)}
.app-excel-success .success-head{padding:16px;border-radius:14px;background:linear-gradient(135deg,rgba(37,99,235,.2),rgba(14,165,233,.16));border:1px solid rgba(147,197,253,.4);margin-bottom:16px}
.app-excel-success h2{color:#93c5fd!important;margin-bottom:8px}
.app-excel-success .quote{color:#dbeafe;font-size:14px}
.app-excel-success #courseName{color:#bfdbfe!important;margin:14px 0}
.app-excel-success .course-list{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin-top:8px}
.app-excel-success .course-card{background:rgba(255,255,255,.04);border:1px solid rgba(126,175,245,.3);border-radius:14px;padding:12px;text-align:left;display:flex;gap:10px;align-items:center}
.app-excel-success .course-logo{width:42px;height:42px;border-radius:10px;object-fit:contain;background:rgba(255,255,255,.92);padding:4px}
.app-excel-success .course-title{font-size:14px;font-weight:600;color:#eff6ff}
.app-excel-success .download-btn{display:inline-block;margin-top:6px;padding:8px 14px;border-radius:18px;background:linear-gradient(90deg,#16a34a,#15803d)!important;color:#fff!important;text-decoration:none!important;font-weight:600;font-size:12px}
.app-excel-success .download-btn.alt{margin-top:18px;background:linear-gradient(90deg,#1e293b,#334155)!important}
.app-excel-success .note{font-size:13px;color:#adc2e8!important;margin-top:14px}
</style>
</head>
  <!-- SECTION: BODY (page content) -->
<body class="app-excel-success">
<div class="shell">
  <a href="index.html" class="top-logo" aria-label="DataLearn10X Home">
    <img src="dl10x.png" alt="DataLearn10X logo">
  </a>
  <div class="box">
    <div class="success-head">
      <h2>🎉 Congratulations! Access Granted</h2>
      <p class="quote">“Small daily learning turns into big career breakthroughs. Keep going!”</p>
    </div>
    <p id="courseName">Your course materials are ready.</p>

    <div id="linksWrap" class="course-list"></div>

    <p class="note">Only courses you purchased are shown below. If any file fails, contact us on WhatsApp with your payment email.</p>
    <a href="index.html" class="download-btn alt">← Back to Home</a>
  </div>
</div>

<script>
function q(name){return new URLSearchParams(location.search).get(name)||'';}
var email=(q('email')||sessionStorage.getItem('paid_email')||'').toLowerCase();
var course=q('course')||sessionStorage.getItem('paid_course')||'';
var paid=sessionStorage.getItem('paid')==='yes';
if(!paid && email){
  try{
    var p=JSON.parse(localStorage.getItem('paidUsers')||'{}');
    if(p[email] && p[email].paid){
      paid=true;
      sessionStorage.setItem('paid','yes');
      sessionStorage.setItem('paid_email',email);
      var localCourse = (Array.isArray(p[email].allCourses) && p[email].allCourses.length)
        ? p[email].allCourses.join(' | ')
        : (p[email].course || '');
      if(localCourse){
        if(!q('course')){ course=localCourse; }
        sessionStorage.setItem('paid_course',localCourse);
      }
    }
  }catch(e){}
}
if(!paid){ alert('Access denied. Please verify your purchase email.'); location.href='check_email.html'; }

var COURSE_LINKS={
  'Advance Excel':'course_pdfs/Advance Excel.pdf',
  'Python':'course_pdfs/Python.pdf',
  'Power BI':'course_pdfs/Power BI.pdf',
  'Tableau':'course_pdfs/Tableau.pdf',
  'SQL (MySQL)':'course_pdfs/SQL (MySQL).pdf',
  'AWS Full Stack Development':'course_pdfs/AWS Full Stack Development.pdf',
  'Learn AI':'course_pdfs/Learn AI.pdf',
  'MongoDB':'course_pdfs/MongoDB.pdf',
  'Git & GitHub':'course_pdfs/Git & GitHub.pdf',
  'Machine Learning + Deep Learning':'course_pdfs/Machine Learning + Deep Learning.pdf',
  'Data Analytics Cheat Sheets':'course_pdfs/Data Analytics Cheat Sheets.pdf',
  '20000+ HR Emails':'course_pdfs/20000+ HR Emails.pdf',
  'Projects Only Course':'course_pdfs/Projects Only Course.pdf'
};
var AVAILABLE_COURSES=Object.keys(COURSE_LINKS).filter(function(name){
  return Boolean(COURSE_LINKS[name]);
});

function normalizeCourseName(name){
  var n=(name||'').trim();
  if(!n) return '';
  var lower=n.toLowerCase();
  if(lower==='data analytics combo' || lower==='combo') return 'Data Analytics Combo';
  if(lower==='sql' || lower==='my sql' || lower==='mysql' || lower==='sql (mysql)') return 'SQL (MySQL)';
  if(lower==='ml + dl' || lower==='ml&dl' || lower==='ml and dl') return 'Machine Learning + Deep Learning';
  return n;
}

function extractCourses(raw){
  var text=(raw||'').trim();
  if(!text) return [];
  var normalized = normalizeCourseName(text);
  if(normalized==='Data Analytics Combo') return AVAILABLE_COURSES.slice();

  var parts=text.split(/\s*\||,\s*/g).map(normalizeCourseName).filter(Boolean);
  var unique=[];
  parts.forEach(function(c){
    if(c==='Data Analytics Combo'){
      AVAILABLE_COURSES.forEach(function(all){ if(unique.indexOf(all)===-1) unique.push(all); });
    } else if(AVAILABLE_COURSES.indexOf(c)>-1 && unique.indexOf(c)===-1){
      unique.push(c);
    }
  });
  return unique;
}

var purchasedCourses=extractCourses(course);
if(!purchasedCourses.length){
  alert('Course mapping not found for this email. Please verify again or contact support.');
  location.href='check_email.html';
}

document.getElementById('courseName').innerText='You now have access to: '+purchasedCourses.join(', ');

var wrap=document.getElementById('linksWrap');
var COURSE_LOGOS={
  'Advance Excel':'https://img.icons8.com/color/96/microsoft-excel-2019--v1.png',
  'Python':'https://img.icons8.com/color/96/python--v1.png',
  'Power BI':'https://img.icons8.com/color/96/power-bi.png',
  'Tableau':'https://img.icons8.com/color/96/tableau-software.png',
  'SQL (MySQL)':'https://img.icons8.com/fluency/96/sql.png',
  'AWS Full Stack Development':'https://img.icons8.com/color/96/amazon-web-services.png',
  'Learn AI':'https://img.icons8.com/color/96/artificial-intelligence.png',
  'MongoDB':'https://img.icons8.com/color/96/mongodb.png',
  'Git & GitHub':'https://img.icons8.com/color/96/github--v1.png',
  'Machine Learning + Deep Learning':'https://img.icons8.com/color/96/artificial-intelligence.png',
  'Data Analytics Cheat Sheets':'https://img.icons8.com/color/96/documents.png',
  '20000+ HR Emails':'https://img.icons8.com/color/96/new-post.png',
  'Projects Only Course':'https://img.icons8.com/color/96/project.png'
};

purchasedCourses.forEach(function(c){
  var card=document.createElement('div');
  card.className='course-card';
  var logo=document.createElement('img');
  logo.className='course-logo';
  logo.src=COURSE_LOGOS[c]||'dl10x.png';
  logo.alt=c+' logo';
  var meta=document.createElement('div');
  var title=document.createElement('div');
  title.className='course-title';
  title.innerText=c;
  var a=document.createElement('a');
  a.href=COURSE_LINKS[c];
  a.className='download-btn';
  a.download=(c+'.pdf');
  a.innerText='⬇ Download PDF';
  meta.appendChild(title);
  meta.appendChild(a);
  card.appendChild(logo);
  card.appendChild(meta);
  wrap.appendChild(card);
});

PSAAnalytics.trackEvent('course_access_page_viewed',{email:email,course:course,visibleCourses:purchasedCourses.join(' | ')});
</script>
</body>
</html>
